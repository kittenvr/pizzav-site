name: Deploy to Server with Docker

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to server via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: ${{ secrets.PORT || '22' }}
        script: |
          mkdir -p ~/pizzav-site
          cd ~/pizzav-site
          git clone https://github.com/${{ github.repository }} . --depth 1
          echo "TUNNEL_TOKEN=${{ secrets.TUNNEL_TOKEN }}" > .env
          echo "DOMAIN=pizzav.xyz" >> .env
          docker compose down
          docker compose up -d --build