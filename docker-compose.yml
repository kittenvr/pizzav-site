version: '3.8'

volumes:
  site-content:

services:
  hugo:
    image: klakegg/hugo:ext-alpine
    container_name: hugo_builder
    volumes:
      - .:/src
      - site-content:/output
    working_dir: /src
    command: hugo --minify --destination=/output
    environment:
      - HUGO_BASEURL=${DOMAIN:-pizzav.xyz}

  caddy:
    image: caddy:2-alpine
    container_name: caddy_server
    depends_on:
      - hugo
    volumes:
      - site-content:/usr/share/caddy:ro
      - ./Caddyfile:/etc/caddy/Caddyfile
    ports:
      - "80:80"
    restart: unless-stopped
    environment:
      - DOMAIN=${DOMAIN:-pizzav.xyz}

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - caddy
    network_mode: service:caddy